<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Layer | Task 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #fff;
            --sub: #444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -1;
        }
        .content { text-align: center; }
        .badge {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--sub);
            margin-bottom: 1.5rem;
            animation: fadeIn 2s ease;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 2rem;
            background: linear-gradient(180deg, #fff 0%, #222 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: reveal 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--sub);
            letter-spacing: 2px;
            font-weight: 800;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
            animation: pulse 2s infinite;
        }
        @keyframes reveal {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="canvas"></div>
    <div class="content">
        <div class="badge">Framework Handshake Established</div>
        <h1>Welcome to Express!</h1>
        <div class="status">
            <div class="dot"></div>
            <span>PORT 3001 : ACTIVE</span>
        </div>
    </div>
</body>
</html>
