<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Posts by User ID</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <h1>Search Posts by User ID</h1>
    <div class="search-panel">
      <label for="userIdInput">User ID</label>
      <input id="userIdInput" type="number" min="1" placeholder="Enter user ID" />
      <button id="searchButton">Search</button>
    </div>
    <section id="results" class="results">
      <p class="hint">Type a user ID and click Search to load posts from JSONPlaceholder.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
