<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Post - PUT Request</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <h1>Update Post (PUT Request)</h1>
    <p class="subtitle">Update an existing post from JSONPlaceholder API</p>
    
    <section id="postsListContainer" class="posts-list-container">
      <h2>Available Posts</h2>
      <div id="postsList" class="posts-list">
        <p class="loading-hint">Loading posts...</p>
      </div>
    </section>

    <div class="form-divider">OR</div>

    <form id="updateForm" class="post-form">
      <label for="postId">Post ID to Update</label>
      <input 
        id="postId" 
        name="postId" 
        type="number" 
        placeholder="Enter post ID (1-100)" 
        min="1" 
        max="100"
        value="1"
        required 
      />

      <label for="title">New Title</label>
      <input 
        id="title" 
        name="title" 
        type="text" 
        placeholder="Enter new post title" 
        required 
      />

      <label for="body">New Body</label>
      <textarea 
        id="body" 
        name="body" 
        placeholder="Enter new post body" 
        rows="5" 
        required>
      </textarea>

      <button type="submit">Update Post</button>
    </form>

    <section id="response" class="response">
      <p class="hint">Fill in the form and click "Update Post" to update a post via JSONPlaceholder API.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
